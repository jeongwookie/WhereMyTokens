<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>WhereMyTokens</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f4f4f8;
      color: #1a1a30;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }
    #root { height: 100%; }
    #splash {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; gap: 16px;
    }
    #splash-logo {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg, #5048b8, #7b6fd4);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      animation: logoPulse 2s ease-in-out infinite;
    }
    #splash-title {
      font-size: 15px; font-weight: 800;
      color: #5048b8; letter-spacing: -0.5px;
    }
    #splash-sub { font-size: 11px; color: #9090a8; display: flex; align-items: center; gap: 6px; }
    .spinner {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid #d0d0e8;
      border-top-color: #5048b8;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes logoPulse { 0%,100%{transform:scale(1);box-shadow:0 0 0 0 #5048b833} 50%{transform:scale(1.06);box-shadow:0 0 0 8px #5048b800} }
  </style>
</head>
<body>
  <div id="splash">
    <div id="splash-logo">📊</div>
    <div id="splash-title">WhereMyTokens</div>
    <div id="splash-sub"><div class="spinner"></div>Loading usage data…</div>
  </div>
  <div id="root" style="display:none; height:100%;"></div>
  <script src="app.js"></script>
</body>
</html>
