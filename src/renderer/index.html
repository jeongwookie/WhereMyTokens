<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self';" />
  <link rel="stylesheet" href="./fonts/noto-sans/400.css">
  <link rel="stylesheet" href="./fonts/noto-sans/700.css">
  <link rel="stylesheet" href="./fonts/noto-sans-kr/400.css">
  <link rel="stylesheet" href="./fonts/noto-sans-kr/700.css">
  <link rel="stylesheet" href="./fonts/noto-sans-jp/400.css">
  <link rel="stylesheet" href="./fonts/noto-sans-jp/700.css">
  <link rel="stylesheet" href="./fonts/jetbrains-mono/400.css">
  <link rel="stylesheet" href="./fonts/jetbrains-mono/700.css">
  <title>WhereMyTokens</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans', 'Noto Sans KR', 'Noto Sans JP', 'Segoe UI', sans-serif;
      background: #f4f4f8;
      color: #1a1a30;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }
    #root { height: 100%; }
    #splash {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; gap: 16px;
    }
    #splash-logo {
      width: 72px; height: 72px;
    }
    #splash-logo img {
      width: 100%; height: 100%; object-fit: contain;
    }
    #splash-title {
      font-size: 15px; font-weight: 800;
      color: #0f766e; letter-spacing: -0.5px;
    }
    #splash-sub { font-size: 11px; color: #9090a8; display: flex; align-items: center; gap: 6px; }
    #splash-slow {
      visibility: hidden;
      opacity: 0;
      font-size: 10px;
      color: #a0a0b8;
      margin-top: -8px;
      font-family: 'JetBrains Mono', monospace;
      animation: revealSlowSplash 0.2s linear 4s forwards;
    }
    .spinner {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid #d0d0e8;
      border-top-color: #0f766e;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes revealSlowSplash { to { visibility: visible; opacity: 1; } }

    /* 커스텀 스크롤바 - CSS 변수 기반 (applyThemeCssVars가 :root에 설정) */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--wmt-border-sub, rgba(255,255,255,0.03)); border-radius: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--wmt-accent-dim, rgba(13,148,136,0.35)); border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--wmt-accent, rgba(13,148,136,0.55)); opacity: 0.55; }
  </style>
</head>
<body>
  <div id="splash">
    <div id="splash-logo"><img src="../../assets/source-icon.png" alt="WhereMyTokens" /></div>
    <div id="splash-title">WhereMyTokens</div>
    <div id="splash-sub"><div class="spinner"></div>Opening dashboard...</div>
    <div id="splash-slow">Preparing dashboard data in the background</div>
  </div>
  <div id="root" style="display:none; height:100%;"></div>
  <script src="app.js"></script>
</body>
</html>
