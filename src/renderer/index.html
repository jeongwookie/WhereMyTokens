<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self';" />
  <link rel="stylesheet" href="./fonts/noto-sans/400.css">
  <link rel="stylesheet" href="./fonts/noto-sans/700.css">
  <link rel="stylesheet" href="./fonts/noto-sans-kr/400.css">
  <link rel="stylesheet" href="./fonts/noto-sans-kr/700.css">
  <link rel="stylesheet" href="./fonts/noto-sans-jp/400.css">
  <link rel="stylesheet" href="./fonts/noto-sans-jp/700.css">
  <title>WhereMyTokens</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans', 'Noto Sans KR', 'Noto Sans JP', 'Segoe UI', sans-serif;
      background: #f4f4f8;
      color: #1a1a30;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }
    #root { height: 100%; }
    #splash {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; gap: 16px;
    }
    #splash-logo {
      width: 72px; height: 72px;
    }
    #splash-logo img {
      width: 100%; height: 100%; object-fit: contain;
    }
    #splash-title {
      font-size: 15px; font-weight: 800;
      color: #5048b8; letter-spacing: -0.5px;
    }
    #splash-sub { font-size: 11px; color: #9090a8; display: flex; align-items: center; gap: 6px; }
    .spinner {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid #d0d0e8;
      border-top-color: #5048b8;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="splash">
    <div id="splash-logo"><img src="../../assets/source-icon.png" alt="WhereMyTokens" /></div>
    <div id="splash-title">WhereMyTokens</div>
    <div id="splash-sub"><div class="spinner"></div>Loading usage data…</div>
  </div>
  <div id="root" style="display:none; height:100%;"></div>
  <script src="app.js"></script>
</body>
</html>
